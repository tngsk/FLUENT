<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>YouTube Downloader & Segmenter - FLUENT Tools</title>
    <style>
      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica,
          Arial, sans-serif;
        margin: 0;
        padding: 20px;
        background-color: #f5f5f5;
        color: #333;
      }
      .container {
        max-width: 900px;
        margin: 0 auto;
        background: white;
        padding: 24px;
        border-radius: 8px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      }
      h1 {
        margin-top: 0;
        font-size: 1.5rem;
        border-bottom: 1px solid #eee;
        padding-bottom: 12px;
      }
      .row {
        margin-bottom: 16px;
      }
      label {
        display: block;
        font-weight: bold;
        margin-bottom: 8px;
      }
      input[type="text"] {
        width: 100%;
        padding: 10px;
        border: 1px solid #ccc;
        border-radius: 4px;
        box-sizing: border-box;
      }
      button {
        padding: 10px 16px;
        border: none;
        border-radius: 4px;
        background: #0066cc;
        color: white;
        font-weight: bold;
        cursor: pointer;
      }
      button:hover {
        background: #0052a3;
      }
      button:disabled {
        background: #ccc;
        cursor: not-allowed;
      }
      button.secondary {
        background: #666;
      }
      button.secondary:hover {
        background: #555;
      }
      button.success {
        background: #28a745;
      }
      button.success:hover {
        background: #218838;
      }

      #waveform-container {
        margin-top: 20px;
        border: 1px solid #ddd;
        border-radius: 4px;
        background: #fafafa;
        padding: 10px;
        display: none;
      }
      #waveform {
        width: 100%;
        height: 128px;
      }
      .controls {
        display: flex;
        gap: 10px;
        margin-top: 10px;
        align-items: center;
      }
      .status {
        margin-left: auto;
        font-size: 0.9em;
        color: #666;
      }
      .region-info {
        font-size: 0.85em;
        margin-top: 10px;
        color: #555;
      }

      .loading-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(255, 255, 255, 0.8);
        display: flex;
        justify-content: center;
        align-items: center;
        z-index: 1000;
        display: none;
        flex-direction: column;
      }
      .spinner {
        width: 40px;
        height: 40px;
        border: 4px solid #f3f3f3;
        border-top: 4px solid #0066cc;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }
      @keyframes spin {
        0% {
          transform: rotate(0deg);
        }
        100% {
          transform: rotate(360deg);
        }
      }
    </style>
    <!-- Load Wavesurfer.js -->
    <script src="https://unpkg.com/wavesurfer.js@7/dist/wavesurfer.min.js"></script>
    <!-- Load Regions plugin -->
    <script src="https://unpkg.com/wavesurfer.js@7/dist/plugins/regions.min.js"></script>
  </head>
  <body>
    <div class="loading-overlay" id="loading">
      <div class="spinner"></div>
      <p style="margin-top: 16px; font-weight: bold" id="loading-text">
        Processing...
      </p>
    </div>

    <div class="container">
      <h1>YouTube Downloader & Segmenter</h1>
      <p>
        Download a YouTube video, visualize its audio waveform, and create
        segments (manual or VAD-based).
      </p>

      <div class="row">
        <label for="url">YouTube URL</label>
        <div style="display: flex; gap: 10px">
          <input
            type="text"
            id="url"
            placeholder="https://www.youtube.com/watch?v=..."
          />
          <button id="btn-download">Download</button>
        </div>
      </div>

      <div id="waveform-container">
        <h3 style="margin-top: 0" id="video-title">Video Title</h3>
        <div id="waveform"></div>
        <div class="controls">
          <button id="btn-play" class="secondary">Play / Pause</button>
          <button id="btn-vad" class="secondary">Auto Segment (VAD)</button>
          <button id="btn-clear" class="secondary">Clear Regions</button>
          <div style="flex-grow: 1"></div>
          <button id="btn-save" class="success">Save Segments</button>
        </div>
        <p class="region-info">
          <strong>Instructions:</strong> Drag on the waveform to create a manual
          region. Drag edges to resize. Double click a region to delete it.
        </p>
      </div>
    </div>

    <script>
      let wavesurfer = null;
      let wsRegions = null;
      let currentFile = null;
      let currentTitle = null;
      let audioUrl = null;

      const el = {
        url: document.getElementById("url"),
        btnDownload: document.getElementById("btn-download"),
        waveformContainer: document.getElementById("waveform-container"),
        waveform: document.getElementById("waveform"),
        title: document.getElementById("video-title"),
        btnPlay: document.getElementById("btn-play"),
        btnVad: document.getElementById("btn-vad"),
        btnClear: document.getElementById("btn-clear"),
        btnSave: document.getElementById("btn-save"),
        loading: document.getElementById("loading"),
        loadingText: document.getElementById("loading-text"),
      };

      const showLoading = (text) => {
        el.loadingText.textContent = text;
        el.loading.style.display = "flex";
      };
      const hideLoading = () => {
        el.loading.style.display = "none";
      };

      const initWavesurfer = () => {
        if (wavesurfer) {
          wavesurfer.destroy();
        }

        wavesurfer = WaveSurfer.create({
          container: "#waveform",
          waveColor: "violet",
          progressColor: "purple",
          cursorColor: "#333",
          barWidth: 2,
          barRadius: 2,
          height: 128,
          normalize: true,
        });

        wsRegions = wavesurfer.registerPlugin(WaveSurfer.Regions.create());

        // Enable dragging to create regions
        wsRegions.enableDragSelection({
          color: "rgba(0, 102, 204, 0.3)",
        });

        // Double click to remove region
        wsRegions.on("region-double-clicked", (region) => {
          region.remove();
        });

        wavesurfer.on("ready", () => {});
      };

      el.btnDownload.addEventListener("click", async () => {
        const url = el.url.value.trim(); // URL入力フィールドの値を取得
        const volumeDb = -12; // 音量を-12dBに固定
        if (!url) return alert("Please enter a YouTube URL");

        showLoading("Downloading audio (this may take a while)...");
        try {
          const res = await fetch("/api/tools/download", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ url, volumeDb }),
          });
          const data = await res.json();
          if (!res.ok || !data.success)
            throw new Error(data.error || "Download failed");

          currentFile = data.file_path;
          currentTitle = data.title;
          el.title.textContent = currentTitle;

          // Load audio into wavesurfer (assuming it's in data/tmp)
          // Since data is mounted as /data, we need to convert absolute path to relative if possible
          // or just fetch by reading it through express. The server mounts DATA_DIR at /data.
          // So if data.file_path is absolute, we need to extract the part after DATA_DIR.
          // The easiest way is to know the file is in /data/tmp/[filename]
          const filename = currentFile.split("/").pop().split("\\").pop();
          audioUrl = `/data/tmp/${filename}`;

          initWavesurfer();
          wavesurfer.load(audioUrl);

          // 波形の読み込みが完了したら自動的にセグメントとして保存する
          wavesurfer.once("ready", async () => {
            hideLoading();
            el.waveformContainer.style.display = "block";

            showLoading("Automatically saving as segment...");
            try {
              const resProcess = await fetch("/api/tools/process", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                  input: currentFile,
                  title: currentTitle,
                  regions: [{ start: 0, end: wavesurfer.getDuration() }],
                }),
              });
              const dataProcess = await resProcess.json();
              if (!resProcess.ok || !dataProcess.success)
                throw new Error(dataProcess.error || "Auto-save failed");

              alert(`Successfully added segment: "${currentTitle}"`);
            } catch (err) {
              alert("Process Error: " + err.message);
            } finally {
              hideLoading();
            }
          });
        } catch (err) {
          hideLoading();
          alert(err.message);
        }
      });

      el.btnPlay.addEventListener("click", () => {
        if (wavesurfer) wavesurfer.playPause();
      });

      el.btnClear.addEventListener("click", () => {
        if (wsRegions) wsRegions.clearRegions();
      });

      el.btnVad.addEventListener("click", async () => {
        if (!currentFile) return;
        showLoading("Running VAD analysis...");
        try {
          const res = await fetch("/api/tools/vad", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ input: currentFile }),
          });
          const data = await res.json();
          if (!res.ok || !data.success)
            throw new Error(data.error || "VAD failed");

          wsRegions.clearRegions();
          data.regions.forEach((r) => {
            wsRegions.addRegion({
              start: r.start,
              end: r.end,
              color: "rgba(40, 167, 69, 0.3)",
            });
          });
        } catch (err) {
          alert(err.message);
        } finally {
          hideLoading();
        }
      });

      el.btnSave.addEventListener("click", async () => {
        if (!wsRegions) return;
        const regions = wsRegions
          .getRegions()
          .map((r) => ({ start: r.start, end: r.end }));
        if (regions.length === 0)
          return alert(
            "No regions created. Please drag on the waveform or use VAD.",
          );

        showLoading("Processing and saving segments...");
        try {
          const res = await fetch("/api/tools/process", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              input: currentFile,
              title: currentTitle,
              regions: regions,
            }),
          });
          const data = await res.json();
          if (!res.ok || !data.success)
            throw new Error(data.error || "Processing failed");

          alert(`Successfully saved ${data.saved_files.length} segment(s)!`);
        } catch (err) {
          alert(err.message);
        } finally {
          hideLoading();
        }
      });
    </script>
  </body>
</html>
